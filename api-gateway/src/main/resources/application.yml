server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      server:
        webmvc:
          routes:

            - id: login-service
              uri: http://login-service:8081
              predicates:
                - Path=/api/auth/**

            - id: product-service
              uri: http://product-service:8082
              predicates:
                - Path=/api/products/**
